apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    app: grafana
    grafana_dashboard: "true"
data:
  auto-repair-shop-overview.json: |
    {
        "id": null,
        "uid": "auto-repair-shop-overview",
        "title": "Auto Repair Shop - Overview",
        "tags": ["auto-repair-shop", "overview"],
        "timezone": "browser",
        "refresh": "30s",
        "time": { "from": "now-24h", "to": "now" },
        "panels": [
          {
            "id": 1,
            "title": "Volume Diário de Ordens de Serviço (Criadas)",
            "type": "timeseries",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "sum(increase(auto_repair_shop_http_server_request_count_total{http_method=\"POST\",http_route=~\".*work-order.*\"}[1d]))",
                "legendFormat": "Ordens Criadas",
                "refId": "A"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "palette-classic" },
                "custom": { "drawStyle": "bars", "fillOpacity": 80 }
              }
            }
          },
          {
            "id": 2,
            "title": "Volume Diário de Ordens de Serviço (Finalizadas)",
            "type": "timeseries",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "sum(increase(auto_repair_shop_http_server_request_count_total{http_method=\"PATCH\",http_route=~\".*work-order.*status.*DONE.*\"}[1d]))",
                "legendFormat": "Ordens Finalizadas",
                "refId": "A"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "fixed", "fixedColor": "green" },
                "custom": { "drawStyle": "bars", "fillOpacity": 80 }
              }
            }
          },
          {
            "id": 3,
            "title": "Latência das APIs (p50, p90, p99)",
            "type": "timeseries",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "histogram_quantile(0.50, sum(rate(auto_repair_shop_http_server_request_duration_milliseconds_bucket[5m])) by (le))",
                "legendFormat": "p50",
                "refId": "A"
              },
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "histogram_quantile(0.90, sum(rate(auto_repair_shop_http_server_request_duration_milliseconds_bucket[5m])) by (le))",
                "legendFormat": "p90",
                "refId": "B"
              },
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "histogram_quantile(0.99, sum(rate(auto_repair_shop_http_server_request_duration_milliseconds_bucket[5m])) by (le))",
                "legendFormat": "p99",
                "refId": "C"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "ms",
                "custom": { "drawStyle": "line", "fillOpacity": 10 }
              }
            }
          },
          {
            "id": 4,
            "title": "Taxa de Requisições HTTP (req/s)",
            "type": "timeseries",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "sum(rate(auto_repair_shop_http_server_request_count_total[5m]))",
                "legendFormat": "Total req/s",
                "refId": "A"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "reqps",
                "custom": { "drawStyle": "line", "fillOpacity": 20 }
              }
            }
          },
          {
            "id": 5,
            "title": "Erros de Banco de Dados",
            "type": "timeseries",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "sum(rate(auto_repair_shop_db_query_error_count_total[5m]))",
                "legendFormat": "DB Errors/s",
                "refId": "A"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "fixed", "fixedColor": "red" },
                "custom": { "drawStyle": "line", "fillOpacity": 30 }
              }
            }
          },
          {
            "id": 6,
            "title": "Latência de Queries no Banco (p50, p95)",
            "type": "timeseries",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "histogram_quantile(0.50, sum(rate(auto_repair_shop_db_query_duration_milliseconds_bucket[5m])) by (le))",
                "legendFormat": "p50",
                "refId": "A"
              },
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "histogram_quantile(0.95, sum(rate(auto_repair_shop_db_query_duration_milliseconds_bucket[5m])) by (le))",
                "legendFormat": "p95",
                "refId": "B"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "ms",
                "custom": { "drawStyle": "line", "fillOpacity": 10 }
              }
            }
          },
          {
            "id": 7,
            "title": "Falhas de Login",
            "type": "stat",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "gridPos": { "h": 4, "w": 6, "x": 0, "y": 24 },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "sum(increase(auto_repair_shop_http_server_request_count_total{http_route=~\".*/api/auth.*\",http_status_code=~\"401|403\"}[1h]))",
                "legendFormat": "Falhas (1h)",
                "refId": "A"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "thresholds": {
                  "steps": [
                    { "value": 0, "color": "green" },
                    { "value": 5, "color": "yellow" },
                    { "value": 20, "color": "red" }
                  ]
                }
              }
            }
          },
          {
            "id": 8,
            "title": "Clientes Criados (Hoje)",
            "type": "stat",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "gridPos": { "h": 4, "w": 6, "x": 6, "y": 24 },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "sum(increase(auto_repair_shop_http_server_request_count_total{http_method=\"POST\",http_route=~\".*/api/customers.*\",http_status_code=~\"2..\"}[1d]))",
                "legendFormat": "Novos Clientes",
                "refId": "A"
              }
            ]
          },
          {
            "id": 9,
            "title": "Ordens Criadas vs Finalizadas (24h)",
            "type": "piechart",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "sum(increase(auto_repair_shop_http_server_request_count_total{http_method=\"POST\",http_route=~\".*work-order.*\",http_status_code=~\"2..\"}[24h]))",
                "legendFormat": "Criadas",
                "refId": "A"
              },
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "sum(increase(auto_repair_shop_http_server_request_count_total{http_method=\"PATCH\",http_route=~\".*work-order.*status.*DONE.*\",http_status_code=~\"2..\"}[24h]))",
                "legendFormat": "Finalizadas",
                "refId": "B"
              }
            ]
          },
          {
            "id": 10,
            "title": "Uptime da Aplicação",
            "type": "stat",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "gridPos": { "h": 4, "w": 6, "x": 0, "y": 28 },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "max(up{job=~\".*otel-collector.*|.*auto-repair-shop.*\"})",
                "legendFormat": "Status",
                "refId": "A"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "mappings": [
                  { "type": "value", "options": { "1": { "text": "UP", "color": "green" }, "0": { "text": "DOWN", "color": "red" } } }
                ]
              }
            }
          }
        ]
    }
  auto-repair-shop-work-orders.json: |
    {
        "id": null,
        "uid": "auto-repair-shop-work-orders",
        "title": "Auto Repair Shop - Ordens de Serviço",
        "tags": ["auto-repair-shop", "work-orders"],
        "timezone": "browser",
        "refresh": "30s",
        "time": { "from": "now-7d", "to": "now" },
        "panels": [
          {
            "id": 1,
            "title": "Tempo Médio de Execução por Status",
            "description": "Tempo médio que ordens de serviço permanecem em cada status (Diagnóstico, Execução, Finalização)",
            "type": "barchart",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "gridPos": { "h": 10, "w": 24, "x": 0, "y": 0 },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "avg(auto_repair_shop_http_server_request_duration_milliseconds_sum{http_route=~\".*work-order.*status.*DIAGNOSIS.*\"}) / avg(auto_repair_shop_http_server_request_count_total{http_route=~\".*work-order.*status.*DIAGNOSIS.*\"})",
                "legendFormat": "Diagnóstico",
                "refId": "A"
              },
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "avg(auto_repair_shop_http_server_request_duration_milliseconds_sum{http_route=~\".*work-order.*status.*IN_PROGRESS.*\"}) / avg(auto_repair_shop_http_server_request_count_total{http_route=~\".*work-order.*status.*IN_PROGRESS.*\"})",
                "legendFormat": "Execução",
                "refId": "B"
              },
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "avg(auto_repair_shop_http_server_request_duration_milliseconds_sum{http_route=~\".*work-order.*status.*DONE.*\"}) / avg(auto_repair_shop_http_server_request_count_total{http_route=~\".*work-order.*status.*DONE.*\"})",
                "legendFormat": "Finalização",
                "refId": "C"
              }
            ],
            "fieldConfig": {
              "defaults": { "unit": "ms" }
            }
          },
          {
            "id": 2,
            "title": "Volume de Ordens por Dia",
            "type": "timeseries",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "gridPos": { "h": 8, "w": 24, "x": 0, "y": 10 },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "sum(increase(auto_repair_shop_http_server_request_count_total{http_method=\"POST\",http_route=~\".*work-order.*\"}[1d]))",
                "legendFormat": "Criadas",
                "refId": "A"
              },
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "sum(increase(auto_repair_shop_http_server_request_count_total{http_method=\"PATCH\",http_route=~\".*work-order.*status.*DONE.*\"}[1d]))",
                "legendFormat": "Finalizadas",
                "refId": "B"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "custom": { "drawStyle": "bars", "fillOpacity": 70 }
              }
            }
          },
          {
            "id": 3,
            "title": "Erros e Falhas nas Integrações",
            "type": "timeseries",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "gridPos": { "h": 8, "w": 24, "x": 0, "y": 18 },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "sum(rate(auto_repair_shop_db_query_error_count_total[5m]))",
                "legendFormat": "Erros de DB",
                "refId": "A"
              },
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "sum(rate(auto_repair_shop_http_server_request_count_total{http_status_code=~\"5..\"}[5m]))",
                "legendFormat": "HTTP 5xx",
                "refId": "B"
              },
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "sum(rate(auto_repair_shop_http_server_request_count_total{http_route=~\".*/api/auth.*\",http_status_code=~\"401|403\"}[5m]))",
                "legendFormat": "Falhas de Auth",
                "refId": "C"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "palette-classic" },
                "custom": { "drawStyle": "line", "fillOpacity": 20 }
              }
            }
          }
        ]
    }
