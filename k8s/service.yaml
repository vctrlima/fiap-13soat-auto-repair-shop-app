# Service for Auto Repair Shop Application
apiVersion: v1
kind: Service
metadata:
  name: auto-repair-shop-service
  labels:
    app: auto-repair-shop
    tier: backend
    environment: production
spec:
  type: ClusterIP
  selector:
    app: auto-repair-shop
    tier: backend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
---
# NodePort Service for external access (development/testing)
apiVersion: v1
kind: Service
metadata:
  name: auto-repair-shop-nodeport
  labels:
    app: auto-repair-shop
    tier: backend
    environment: production
spec:
  type: NodePort
  selector:
    app: auto-repair-shop
    tier: backend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30080
---
# Service for PostgreSQL Database
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  labels:
    app: postgres
    tier: database
    environment: production
spec:
  type: ClusterIP
  selector:
    app: postgres
    tier: database
  ports:
    - name: postgres
      protocol: TCP
      port: 5432
      targetPort: 5432
