---
apiVersion: v1
kind: Namespace
metadata:
  name: auto-repair-shop
  labels:
    app: auto-repair-shop
    environment: production

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: auto-repair-shop
  annotations:
    eks.amazonaws.com/role-arn: '${SECRETS_MANAGER_ROLE_ARN}'
  labels:
    app: auto-repair-shop

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auto-repair-shop-config
  namespace: auto-repair-shop
  labels:
    app: auto-repair-shop
    tier: backend
    environment: production
data:
  SERVER_HOST: 'http://0.0.0.0'
  SERVER_PORT: '3000'
  NODE_ENV: 'production'

  PASSWORD_HASH_SALT: '10'

  MAILING_ENABLED: 'true'
  SMTP_HOST: 'sandbox.smtp.mailtrap.io'
  SMTP_PORT: '587'

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auto-repair-shop
  namespace: auto-repair-shop
  labels:
    app: auto-repair-shop
    tier: backend
    environment: production
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: auto-repair-shop
      tier: backend
  template:
    metadata:
      labels:
        app: auto-repair-shop
        tier: backend
        environment: production
    spec:
      serviceAccountName: external-secrets-sa
      containers:
        - name: auto-repair-shop
          image: '${ECR_REPOSITORY_URL}:${IMAGE_TAG}'
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
              name: http
          envFrom:
            - configMapRef:
                name: auto-repair-shop-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: auto-repair-shop-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auto-repair-shop-secret
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: auto-repair-shop-secret
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: auto-repair-shop-secret
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: auto-repair-shop-secret
                  key: DB_NAME
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: auto-repair-shop-secret
                  key: DATABASE_URL
            - name: JWT_ACCESS_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: auto-repair-shop-secret
                  key: JWT_ACCESS_TOKEN_SECRET
            - name: JWT_REFRESH_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: auto-repair-shop-secret
                  key: JWT_REFRESH_TOKEN_SECRET
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: auto-repair-shop-secret
                  key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auto-repair-shop-secret
                  key: SMTP_PASSWORD
          resources:
            requests:
              cpu: '100m'
              memory: '256Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: auto-repair-shop-service
  namespace: auto-repair-shop
  labels:
    app: auto-repair-shop
    tier: backend
    environment: production
spec:
  type: ClusterIP
  selector:
    app: auto-repair-shop
    tier: backend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000

---
apiVersion: elbv2.k8s.aws/v1beta1
kind: TargetGroupBinding
metadata:
  name: auto-repair-shop-tgb
  namespace: auto-repair-shop
  labels:
    app: auto-repair-shop
spec:
  serviceRef:
    name: auto-repair-shop-service
    port: 80
  targetGroupARN: '${TARGET_GROUP_ARN}'
  targetType: ip

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auto-repair-shop-hpa
  namespace: auto-repair-shop
  labels:
    app: auto-repair-shop
    tier: backend
    environment: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auto-repair-shop
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
