# Secret for Auto Repair Shop Application
# Contains sensitive configuration variables (base64 encoded)
#
# IMPORTANT: In production, use external secret management (e.g., AWS Secrets Manager, Vault)
# The values below are examples and should be replaced with actual secrets
#
# To encode a value: echo -n "your-secret" | base64
# To decode a value: echo "encoded-value" | base64 -d
apiVersion: v1
kind: Secret
metadata:
  name: auto-repair-shop-secret
  labels:
    app: auto-repair-shop
    tier: backend
    environment: production
type: Opaque
data:
  # Database Credentials
  # postgres (base64)
  DB_USER: cG9zdGdyZXM=
  # admin (base64)
  DB_PASSWORD: YWRtaW4=

  # JWT Secrets (32 character hex strings)
  # 5b328d283d9a9982596057659c71e3a5 (base64)
  JWT_ACCESS_TOKEN_SECRET: NWIzMjhkMjgzZDlhOTk4MjU5NjA1NzY1OWM3MWUzYTU=
  # 8b4e55de6e8b8401cfd56613f356c7cd (base64)
  JWT_REFRESH_TOKEN_SECRET: OGI0ZTU1ZGU2ZThiODQwMWNmZDU2NjEzZjM1NmM3Y2Q=

  # SMTP Credentials (for email functionality)
