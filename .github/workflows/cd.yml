name: "CD - Application"

on:
  workflow_run:
    workflows: ["CI - Application"]
    branches: [main, staging]
    types:
      - completed

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/vctrlima/fiap-13soat-techchallenge

jobs:
  set-env:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      eks_cluster: ${{ steps.env.outputs.eks_cluster }}
      tf_state_key: ${{ steps.env.outputs.tf_state_key }}
      image_tag_prefix: ${{ steps.env.outputs.image_tag_prefix }}
    steps:
      - name: Determine environment from branch
        id: env
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          if [ "$BRANCH" = "main" ]; then
            echo "environment=production"       >> $GITHUB_OUTPUT
            echo "eks_cluster=auto-repair-shop-cluster"  >> $GITHUB_OUTPUT
            echo "tf_state_key=fiap-13soat-auto-repair-shop-k8s-production/terraform.tfstate" >> $GITHUB_OUTPUT
            echo "image_tag_prefix=production"  >> $GITHUB_OUTPUT
          elif [ "$BRANCH" = "staging" ]; then
            echo "environment=staging"          >> $GITHUB_OUTPUT
            echo "eks_cluster=auto-repair-shop-staging"  >> $GITHUB_OUTPUT
            echo "tf_state_key=fiap-13soat-auto-repair-shop-k8s-staging/terraform.tfstate" >> $GITHUB_OUTPUT
            echo "image_tag_prefix=staging"     >> $GITHUB_OUTPUT
          else
            echo "::error::Unsupported branch: $BRANCH"
            exit 1
          fi

  build-and-push:
    runs-on: ubuntu-latest
    needs: set-env
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/development
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REPOSITORY }}:${{ needs.set-env.outputs.image_tag_prefix }}-${{ github.event.workflow_run.head_sha }}
            ${{ env.ECR_REPOSITORY }}:${{ needs.set-env.outputs.image_tag_prefix }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [set-env, build-and-push]
    environment: ${{ needs.set-env.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/development
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Read infrastructure outputs from remote state
        id: infra
        run: |
          mkdir -p /tmp/tf-remote-state
          cat > /tmp/tf-remote-state/main.tf <<EOF
          data "terraform_remote_state" "k8s_infra" {
            backend = "s3"
            config = {
              bucket = "auto-repair-shop-terraform-state"
              key    = "${{ needs.set-env.outputs.tf_state_key }}"
              region = "us-east-2"
            }
          }
          output "target_group_arn"        { value = data.terraform_remote_state.k8s_infra.outputs.target_group_arn }
          output "secrets_manager_role_arn" { value = data.terraform_remote_state.k8s_infra.outputs.secrets_manager_role_arn }
          output "secrets_manager_name"     { value = data.terraform_remote_state.k8s_infra.outputs.secrets_manager_name }
          output "alb_dns_name"             { value = data.terraform_remote_state.k8s_infra.outputs.alb_dns_name }
          output "grafana_target_group_arn" { value = data.terraform_remote_state.k8s_infra.outputs.grafana_target_group_arn }
          EOF
          cd /tmp/tf-remote-state
          terraform init
          terraform apply -auto-approve > /dev/null
          echo "TARGET_GROUP_ARN=$(terraform output -raw target_group_arn)" >> $GITHUB_OUTPUT
          echo "SECRETS_ROLE_ARN=$(terraform output -raw secrets_manager_role_arn)" >> $GITHUB_OUTPUT
          echo "SECRET_NAME=$(terraform output -raw secrets_manager_name)" >> $GITHUB_OUTPUT
          echo "ALB_DNS=$(terraform output -raw alb_dns_name)" >> $GITHUB_OUTPUT
          echo "GRAFANA_TG_ARN=$(terraform output -raw grafana_target_group_arn)" >> $GITHUB_OUTPUT

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ needs.set-env.outputs.eks_cluster }} \
            --region ${{ env.AWS_REGION }}

      - name: Prepare and deploy K8s manifests
        run: |
          IMAGE_TAG="${{ needs.set-env.outputs.image_tag_prefix }}-${{ github.event.workflow_run.head_sha }}"
          ENVIRONMENT="${{ needs.set-env.outputs.environment }}"

          # Replace placeholderss
          sed -i "s|\${ECR_REPOSITORY_URL}|${{ env.ECR_REPOSITORY }}|g" k8s/aws/deployment.yaml
          sed -i "s|\${IMAGE_TAG}|${IMAGE_TAG}|g" k8s/aws/deployment.yaml
          sed -i "s|\${TARGET_GROUP_ARN}|${{ steps.infra.outputs.TARGET_GROUP_ARN }}|g" k8s/aws/deployment.yaml
          sed -i "s|\${SECRETS_MANAGER_ROLE_ARN}|${{ steps.infra.outputs.SECRETS_ROLE_ARN }}|g" k8s/aws/deployment.yaml
          sed -i "s|\${ENVIRONMENT}|${ENVIRONMENT}|g" k8s/aws/deployment.yaml
          sed -i "s|\${AWS_SECRET_NAME}|${{ steps.infra.outputs.SECRET_NAME }}|g" k8s/aws/external-secrets.yaml
          sed -i "s|\${ENVIRONMENT}|${ENVIRONMENT}|g" k8s/aws/external-secrets.yaml

          # Apply manifests
          kubectl apply -f k8s/aws/deployment.yaml
          kubectl apply --server-side -f k8s/aws/external-secrets.yaml

          # Wait for ExternalSecret sync (fail if not ready - secrets are required)
          echo "Waiting for ExternalSecret to sync..."
          if ! kubectl wait --for=condition=Ready externalsecret/auto-repair-shop-secret \
            --namespace auto-repair-shop --timeout=120s; then
            echo "::error::ExternalSecret failed to sync. Debugging info:"
            kubectl get externalsecret -n auto-repair-shop -o yaml
            kubectl get secretstore -n auto-repair-shop -o yaml
            kubectl get secret auto-repair-shop-secret -n auto-repair-shop -o json | jq '.data | keys' || true
            exit 1
          fi

          # Restart deployment
          kubectl rollout restart deployment/auto-repair-shop -n auto-repair-shop
          if ! kubectl rollout status deployment/auto-repair-shop \
            --namespace auto-repair-shop --timeout=300s; then
            echo "::error::Deployment rollout failed. Debugging info:"
            kubectl get pods -n auto-repair-shop
            kubectl describe pods -n auto-repair-shop -l app=auto-repair-shop | tail -50
            for pod in $(kubectl get pods -n auto-repair-shop -l app=auto-repair-shop -o jsonpath='{.items[*].metadata.name}'); do
              echo "=== Logs for $pod ==="
              kubectl logs "$pod" -n auto-repair-shop --tail=50 || true
            done
            exit 1
          fi

      - name: Deploy monitoring stack
        run: |
          # Generate a random Grafana admin password if not set via secret
          GRAFANA_PASS="${{ secrets.GRAFANA_ADMIN_PASSWORD }}"
          if [ -z "$GRAFANA_PASS" ]; then
            GRAFANA_PASS=$(openssl rand -base64 24)
            echo "::notice::Grafana admin password auto-generated. Set GRAFANA_ADMIN_PASSWORD secret to use a fixed one."
          fi
          sed -i "s|\${GRAFANA_ADMIN_PASSWORD}|${GRAFANA_PASS}|g" k8s/monitoring/grafana.yaml
          sed -i "s|\${GRAFANA_TARGET_GROUP_ARN}|${{ steps.infra.outputs.GRAFANA_TG_ARN }}|g" k8s/monitoring/grafana.yaml

          kubectl apply -f k8s/monitoring/namespace.yaml
          kubectl apply -f k8s/monitoring/otel-collector.yaml
          kubectl apply -f k8s/monitoring/alerting-rules.yaml
          kubectl apply -f k8s/monitoring/grafana-dashboards.yaml
          kubectl apply -f k8s/monitoring/grafana.yaml
          kubectl rollout status deployment/otel-collector -n monitoring --timeout=120s || true
          kubectl rollout status deployment/grafana -n monitoring --timeout=120s || true

      - name: Health check
        run: |
          echo "Waiting for application to be ready..."
          sleep 30
          for i in {1..10}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://${{ steps.infra.outputs.ALB_DNS }}/health" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i/10 - Status: $HTTP_STATUS"
            sleep 15
          done
          echo "Health check did not pass within expected time."
          exit 0
